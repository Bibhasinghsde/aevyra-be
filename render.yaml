services:
  - type: web
    name: aevyra-be
    env: python
    region: oregon
    buildCommand: "bash build.sh"
    startCommand: "python manage.py migrate && gunicorn config.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard
      - key: DB_SSLMODE
        value: "require"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:3000,http://127.0.0.1:3000,https://aevyra-ui.vercel.app,https://aevyra-1n3motig9-bibhasinghsdes-projects.vercel.app"
